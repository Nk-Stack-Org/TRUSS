name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Verify CLI loads
        run: node .truss/bin/truss.mjs help

      # node --test with no path args discovers every *.test.mjs recursively,
      # including the dashboard suite (.truss/dashboard/**). No shell globbing,
      # so one step works identically on Linux, macOS and Windows.
      - name: Run test suite
        working-directory: .truss
        run: node --test
